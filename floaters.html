<title>Modulove logo floaters</title>
<style>
  html, body { margin: 0; padding: 0; background: #000; overflow: hidden; height: 100%; }
  body {
      display: block;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
  }
  /* Re-enable normal touch interactions and text selection inside the
     debug panel so range sliders and the file picker still respond. */
  #debug, #debug * { touch-action: auto; -webkit-user-select: auto; user-select: auto; }
  canvas { display: block; width: 100vw; height: 100vh; }

  #debug {
      position: fixed;
      top: 12px;
      right: 12px;
      width: 270px;
      max-height: calc(100vh - 24px);
      overflow-y: auto;
      background: rgba(0, 0, 0, 0.85);
      color: #fff;
      font: 12px/1.35 system-ui, sans-serif;
      padding: 10px 12px 12px;
      border: 1px solid #444;
      border-radius: 6px;
      z-index: 10;
  }
  #debug.hidden { display: none; }
  #debug h3 { margin: 0 0 6px; font-size: 12px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; color: #aef; }
  #debug h4 { margin: 12px 0 4px; font-size: 11px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; color: #fa6; }
  #debug label { display: block; margin: 8px 0 2px; cursor: default; }
  #debug input[type=range] { width: 100%; margin: 2px 0 0; }
  #debug .val { float: right; font-weight: 600; color: #aef; font-variant-numeric: tabular-nums; }
  #debug .row { display: flex; gap: 6px; margin: 6px 0; flex-wrap: wrap; }
  #debug button {
      background: #222; color: #fff; border: 1px solid #555;
      padding: 4px 8px; cursor: pointer; font: 11px system-ui, sans-serif;
      border-radius: 3px; flex: 1 1 auto;
  }
  #debug button:hover { background: #333; border-color: #777; }
  #debug select {
      width: 100%; background: #222; color: #fff; border: 1px solid #555;
      padding: 4px 6px; font: 12px system-ui, sans-serif; border-radius: 3px;
      margin: 2px 0 0;
  }
  #debug .fft { display: flex; gap: 4px; margin: 6px 0 2px; height: 8px; }
  #debug .fft > div {
      flex: 1; background: #222; border-radius: 1px;
      position: relative; overflow: hidden;
  }
  #debug .fft > div::after {
      content: ''; position: absolute; left: 0; bottom: 0; width: 100%;
      height: var(--lvl, 0%); background: #aef; transition: height 50ms;
  }
  #debug.learn-mode { border-color: #fa6; box-shadow: 0 0 0 1px #fa6 inset; }
  #debug input[type=range].learn-target { outline: 2px solid #fa6; outline-offset: 1px; }
  #debug .midi-list {
      font-size: 11px; color: #aaa; max-height: 110px; overflow-y: auto;
      margin-top: 6px; line-height: 1.4;
  }
  #debug .midi-list > div {
      display: flex; justify-content: space-between; align-items: center;
      padding: 1px 0; gap: 6px;
  }
  #debug .midi-list button {
      flex: 0 0 auto; padding: 0 6px; min-width: 0;
      font-size: 12px; line-height: 1.2;
  }
  #debug .midi-status { color: #888; font-size: 10px; margin: 4px 0 0; }
  #debug .checks { display: flex; gap: 14px; margin: 6px 0 4px; align-items: center; }
  #debug .checks label {
      display: inline-flex; align-items: center; gap: 5px;
      margin: 0; cursor: pointer; user-select: none;
  }
  #debug .checks input[type=checkbox] { margin: 0; cursor: pointer; }
  #debug .hint { color: #888; font-size: 10px; margin-top: 10px; line-height: 1.4; }
  #debug hr { border: 0; border-top: 1px solid #333; margin: 10px 0 4px; }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="debug" class="hidden">
    <h3>Debug</h3>

    <label>Preset
        <select id="s_preset">
            <option value="">(custom)</option>
            <option value="clean">Clean</option>
            <option value="vhs">VHS</option>
            <option value="cosmic">Cosmic</option>
            <option value="storm">Storm</option>
            <option value="disco">Disco</option>
        </select>
    </label>

    <hr>

    <label>Count per logo <span class="val" id="v_count">3</span>
        <input type="range" id="s_count" min="1" max="8" step="1" value="3">
    </label>
    <div class="checks">
        <label><input type="checkbox" id="enable_logo1" checked> logo1</label>
        <label><input type="checkbox" id="enable_logo2" checked> logo2</label>
    </div>
    <div class="row">
        <button id="respawn">Respawn floaters</button>
    </div>

    <hr>

    <label>Base size (px) <span class="val" id="v_size">300</span>
        <input type="range" id="s_size" min="50" max="800" step="10" value="300">
    </label>
    <label>Depth amp <span class="val" id="v_depth">0.30</span>
        <input type="range" id="s_depth" min="0" max="0.70" step="0.01" value="0.30">
    </label>
    <label>Wobble amp <span class="val" id="v_wobble">0.10</span>
        <input type="range" id="s_wobble" min="0" max="0.30" step="0.01" value="0.10">
    </label>

    <hr>

    <label>Min speed <span class="val" id="v_minspeed">40</span>
        <input type="range" id="s_minspeed" min="0" max="400" step="5" value="40">
    </label>
    <label>Max speed <span class="val" id="v_maxspeed">220</span>
        <input type="range" id="s_maxspeed" min="50" max="800" step="5" value="220">
    </label>
    <label>Flow strength <span class="val" id="v_flow">35</span>
        <input type="range" id="s_flow" min="0" max="150" step="1" value="35">
    </label>
    <label>Damping <span class="val" id="v_damp">0.10</span>
        <input type="range" id="s_damp" min="0" max="0.50" step="0.01" value="0.10">
    </label>

    <hr>

    <label>Collide tolerance <span class="val" id="v_tol">0.15</span>
        <input type="range" id="s_tol" min="0" max="0.60" step="0.01" value="0.15">
    </label>
    <label>Spin on wall bounce <span class="val" id="v_spinb">60</span>
        <input type="range" id="s_spinb" min="0" max="180" step="5" value="60">
    </label>
    <label>Spin on collision <span class="val" id="v_spinc">80</span>
        <input type="range" id="s_spinc" min="0" max="180" step="5" value="80">
    </label>

    <hr>

    <label>Gravity (px/s&sup2;) <span class="val" id="v_gravity">0</span>
        <input type="range" id="s_gravity" min="0" max="1500" step="10" value="0">
    </label>
    <div class="row">
        <button data-gravity="0">None</button>
        <button data-gravity="162">Moon</button>
        <button data-gravity="980">Earth</button>
    </div>

    <h4>Mobile sensors</h4>

    <div class="checks">
        <label><input type="checkbox" id="tilt_enable"> Tilt</label>
        <label><input type="checkbox" id="shake_enable"> Shake</label>
    </div>
    <label>Tilt strength <span class="val" id="v_tiltstr">600</span>
        <input type="range" id="s_tiltstr" min="0" max="2000" step="10" value="600">
    </label>
    <label>Shake threshold (m/s&sup2;) <span class="val" id="v_shaketh">18</span>
        <input type="range" id="s_shaketh" min="5" max="50" step="1" value="18">
    </label>
    <div id="sensor_status" class="midi-status">Off.</div>

    <h4>Effects</h4>

    <label>Trail persistence (s) <span class="val" id="v_trail">0.00</span>
        <input type="range" id="s_trail" min="0" max="3" step="0.05" value="0">
    </label>
    <label>Chromatic aberration <span class="val" id="v_ca">0.00</span>
        <input type="range" id="s_ca" min="0" max="0.10" step="0.002" value="0">
    </label>
    <label>Hue intensity <span class="val" id="v_hint">0.00</span>
        <input type="range" id="s_hint" min="0" max="1" step="0.01" value="0">
    </label>
    <label>Hue cycle (Hz) <span class="val" id="v_hspd">0.00</span>
        <input type="range" id="s_hspd" min="0" max="0.50" step="0.01" value="0">
    </label>

    <h4>Audio reactivity</h4>

    <label>Source
        <select id="audio_source">
            <option value="off">Off</option>
            <option value="mic">Microphone</option>
            <option value="file">Audio file&hellip;</option>
        </select>
    </label>
    <input type="file" id="audio_file" accept="audio/*" style="display:none">

    <label>Bass intensity <span class="val" id="v_abass">0.00</span>
        <input type="range" id="s_abass" min="0" max="2" step="0.05" value="0">
    </label>
    <label>Mid intensity <span class="val" id="v_amid">0.00</span>
        <input type="range" id="s_amid" min="0" max="2" step="0.05" value="0">
    </label>
    <label>Treble intensity <span class="val" id="v_atreble">0.00</span>
        <input type="range" id="s_atreble" min="0" max="2" step="0.05" value="0">
    </label>

    <div class="fft">
        <div id="fft_bass"></div>
        <div id="fft_mid"></div>
        <div id="fft_treble"></div>
    </div>

    <h4>WebMIDI</h4>

    <label>Device
        <select id="midi_device">
            <option value="">(none)</option>
        </select>
    </label>
    <div class="row">
        <button id="midi_learn">MIDI Learn</button>
        <button id="midi_clear">Clear all</button>
    </div>
    <div id="midi_list" class="midi-list">No mappings.</div>
    <div id="midi_status" class="midi-status">Initialising&hellip;</div>

    <div class="hint"><b>D</b> toggle this panel &middot; <b>F</b> fullscreen<br>or long-press anywhere on the screen</div>
</div>

<script>
"use strict";

// ---- Tunable parameters (mutated by the debug panel) -----------------
const params = {
    logo_count:        3,
    base_size:         300,
    depth_amp:         0.30,
    wobble_amp:        0.10,
    min_speed:         40,
    max_speed:         220,
    flow_strength:     35,
    damping:           0.10,
    depth_collide_tol: 0.15,
    spin_bounce:       60,
    spin_collision:    80,
    gravity:           0,
    tilt_strength:     600,   // device-tilt-driven gravity magnitude (px/s^2)
    shake_threshold:   18,    // motion magnitude (m/s^2) that triggers a respawn
    // Effects
    trail_persistence: 0,     // seconds; 0 = full clear each frame
    aberration:        0,     // radial chromatic aberration in uv units
    hue_intensity:     0,     // 0..1, scales the per-instance hue offset
    hue_speed:         0,     // hue cycle rate in Hz
    // Audio reactivity sensitivities (0..2)
    audio_bass:        0,
    audio_mid:         0,
    audio_treble:      0,
};

// Scale defaults down on small screens (phones / tablets). Computed once
// at boot from the initial viewport min-dimension; affects the initial
// params and is re-applied to base_size / logo_count whenever a preset
// is loaded so presets remain usable on mobile.
const SCREEN_SCALE = (function () {
    const minDim = Math.min(window.innerWidth, window.innerHeight);
    if (minDim < 500) return 0.40;   // phone
    if (minDim < 800) return 0.65;   // tablet
    return 1.0;                       // desktop
})();
if (SCREEN_SCALE < 1) {
    params.base_size  = Math.round(params.base_size * SCREEN_SCALE);
    params.logo_count = Math.max(1, Math.round(params.logo_count * SCREEN_SCALE));
}

// ---- Helpers ----------------------------------------------------------
const rand_range = (a, b) => a + Math.random() * (b - a);
const rand_sign  = ()     => (Math.random() < 0.5 ? -1 : 1);

// ---- Canvas / GL setup -----------------------------------------------
const canvas = document.getElementById("c");
function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

const gl = canvas.getContext("webgl", { alpha: false, premultipliedAlpha: false, antialias: true, preserveDrawingBuffer: true });
if (!gl) {
    document.body.innerHTML = "<div style='color:#fff;font-family:sans-serif;padding:2em'>WebGL not available.</div>";
    throw new Error("no webgl");
}

function compileShader(src, type) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
        throw new Error("shader compile failed: " + gl.getShaderInfoLog(s));
    }
    return s;
}
function linkProgram(vsSrc, fsSrc) {
    const p = gl.createProgram();
    gl.attachShader(p, compileShader(vsSrc, gl.VERTEX_SHADER));
    gl.attachShader(p, compileShader(fsSrc, gl.FRAGMENT_SHADER));
    gl.linkProgram(p);
    if (!gl.getProgramParameter(p, gl.LINK_STATUS)) {
        throw new Error("program link failed: " + gl.getProgramInfoLog(p));
    }
    return p;
}

// ---- Logo program ----------------------------------------------------
const VS_LOGO = `
attribute vec2 a_pos;
attribute vec2 a_uv;
uniform mat3 u_xform;
uniform vec2 u_screen;
varying vec2 v_uv;
void main() {
    vec3 p = u_xform * vec3(a_pos, 1.0);
    vec2 clip = (p.xy / u_screen) * 2.0 - 1.0;
    clip.y = -clip.y;
    gl_Position = vec4(clip, 0.0, 1.0);
    v_uv = a_uv;
}
`;

// Wobble (organic layered sines) + radial chromatic aberration (3 taps)
// + per-instance hue rotation around the achromatic axis (Rodrigues).
const FS_LOGO = `
precision mediump float;
uniform sampler2D u_tex;
uniform float u_time;
uniform float u_wobble_amp;
uniform float u_aberration;
uniform float u_hue;
varying vec2 v_uv;

vec3 rotate_hue(vec3 c, float h) {
    const vec3 k = vec3(0.5773503);
    float ch = cos(h);
    return c * ch + cross(k, c) * sin(h) + k * dot(k, c) * (1.0 - ch);
}

void main() {
    vec2 uv = v_uv;
    float falloff = 0.5 - min(0.5, distance(uv, vec2(0.5)));
    float wx = sin(u_time * 0.37 + uv.y * 3.1)       * 0.5
             + sin(u_time * 0.73 + uv.y * 5.7 + 1.3) * 0.3
             + sin(u_time * 1.13 + uv.x * 2.3 + 2.7) * 0.2;
    float wy = cos(u_time * 0.41 + uv.x * 2.9 + 2.1) * 0.5
             + cos(u_time * 0.67 + uv.x * 6.3 + 0.7) * 0.3
             + cos(u_time * 1.09 + uv.y * 1.9 + 4.2) * 0.2;
    vec2 suv = uv + vec2(wx, wy) * falloff * u_wobble_amp;

    vec2 dir = (suv - vec2(0.5)) * u_aberration;
    float r  = texture2D(u_tex, suv - dir).r;
    vec4  ga = texture2D(u_tex, suv);
    float b  = texture2D(u_tex, suv + dir).b;

    vec3 color = rotate_hue(vec3(r, ga.g, b), u_hue);
    gl_FragColor = vec4(color, ga.a);
}
`;

const progLogo = linkProgram(VS_LOGO, FS_LOGO);
const A_POS    = gl.getAttribLocation(progLogo,  "a_pos");
const A_UV     = gl.getAttribLocation(progLogo,  "a_uv");
const U_XFORM  = gl.getUniformLocation(progLogo, "u_xform");
const U_SCREEN = gl.getUniformLocation(progLogo, "u_screen");
const U_TIME   = gl.getUniformLocation(progLogo, "u_time");
const U_WOBBLE = gl.getUniformLocation(progLogo, "u_wobble_amp");
const U_ABER   = gl.getUniformLocation(progLogo, "u_aberration");
const U_HUE    = gl.getUniformLocation(progLogo, "u_hue");
const U_TEX    = gl.getUniformLocation(progLogo, "u_tex");

const quad = new Float32Array([
    -0.5, -0.5, 0.0, 0.0,
     0.5, -0.5, 1.0, 0.0,

// ---- Common GL state -------------------------------------------------
gl.enable(gl.BLEND);
gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);
gl.clearColor(0, 0, 0, 1);

function loadTexture(dataUrl) {
    return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => {
            const tex = gl.createTexture();
            gl.bindTexture(gl.TEXTURE_2D, tex);
            gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, false);
            gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, img);
            gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S,     gl.CLAMP_TO_EDGE);
            gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T,     gl.CLAMP_TO_EDGE);
            gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
            gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
            resolve(tex);
        };
        img.onerror = reject;
        img.src = dataUrl;
    });
}

// ---- Physics ---------------------------------------------------------
function spawn(key) {
    return {
        key,
        cx:          rand_range(0.15, 0.85) * canvas.width,
        cy:          rand_range(0.15, 0.85) * canvas.height,
        vel_x:       rand_range(60, 130) * rand_sign(),
        vel_y:       rand_range(45, 100) * rand_sign(),
        angle:       rand_range(0, 360),
        spin:        0,
        depth_phase: rand_range(0, Math.PI * 2),
        depth_freq:  rand_range(0.25, 0.65),
        flow_phx:    rand_range(0, Math.PI * 2),
        flow_phy:    rand_range(0, Math.PI * 2),
        flow_fx:     rand_range(0.20, 0.55),
        flow_fy:     rand_range(0.20, 0.55),
        hue_offset:  Math.random(),     // [0, 1) fixed at spawn for per-instance hue
    };
}

function size_of(f, now) {
    return params.base_size * (1 + params.depth_amp * Math.sin(now * f.depth_freq + f.depth_phase));
}

function clamp_speed(f) {
    const s = Math.sqrt(f.vel_x * f.vel_x + f.vel_y * f.vel_y);
    if (s < 1e-3) {
        const a = rand_range(0, Math.PI * 2);
        f.vel_x = Math.cos(a) * params.min_speed;
        f.vel_y = Math.sin(a) * params.min_speed;
    } else if (s < params.min_speed) {
        f.vel_x = f.vel_x * params.min_speed / s;
        f.vel_y = f.vel_y * params.min_speed / s;
    } else if (s > params.max_speed) {
        f.vel_x = f.vel_x * params.max_speed / s;
        f.vel_y = f.vel_y * params.max_speed / s;
    }
}

function bounce(f, now) {
    const half = size_of(f, now) / 2;
    let hit = false;
    if (f.cx < half)                      { f.cx = 2 * half - f.cx;                     f.vel_x = -f.vel_x; hit = true; }
    else if (f.cx > canvas.width  - half) { f.cx = 2 * (canvas.width  - half) - f.cx;   f.vel_x = -f.vel_x; hit = true; }
    if (f.cy < half)                      { f.cy = 2 * half - f.cy;                     f.vel_y = -f.vel_y; hit = true; }
    else if (f.cy > canvas.height - half) { f.cy = 2 * (canvas.height - half) - f.cy;   f.vel_y = -f.vel_y; hit = true; }
    if (!hit) return;

    f.spin   = rand_range(-params.spin_bounce, params.spin_bounce);
    f.vel_x *= rand_range(0.85, 1.20);
    f.vel_y *= rand_range(0.85, 1.20);
    clamp_speed(f);
}

function collide_pair(a, b, now) {
    const sa = size_of(a, now);
    const sb = size_of(b, now);
    if (Math.abs(sa - sb) / ((sa + sb) * 0.5) > params.depth_collide_tol) return;

    const ra = sa * 0.5;
    const rb = sb * 0.5;
    const dx = b.cx - a.cx;
    const dy = b.cy - a.cy;
    const d2 = dx * dx + dy * dy;
    const rsum = ra + rb;
    if (d2 >= rsum * rsum || d2 < 1e-6) return;

    const d  = Math.sqrt(d2);
    const nx = dx / d;
    const ny = dy / d;
    const rel_n = (b.vel_x - a.vel_x) * nx + (b.vel_y - a.vel_y) * ny;
    if (rel_n >= 0) return;

    a.vel_x += rel_n * nx; a.vel_y += rel_n * ny;
    b.vel_x -= rel_n * nx; b.vel_y -= rel_n * ny;

    const push = (rsum - d) * 0.5;
    a.cx -= nx * push; a.cy -= ny * push;
    b.cx += nx * push; b.cy += ny * push;

    a.spin = rand_range(-params.spin_collision, params.spin_collision);
    b.spin = rand_range(-params.spin_collision, params.spin_collision);
    clamp_speed(a);
    clamp_speed(b);
}

    floaters.length = 0;
    for (const key of Object.keys(LOGO_DATA)) {
        if (!logoEnabled[key]) continue;
        for (let i = 0; i < params.logo_count; i++) {
            floaters.push(spawn(key));
        }
    }
}

// Touch equivalent for the D key: a single-finger long press on the
// canvas (anywhere outside the debug panel) toggles the panel. Keeps
// the screensaver chrome-free on phones / tablets.
let _touchTimer = null;
let _touchStartX = 0, _touchStartY = 0;
const LONG_PRESS_MS = 600;
const LONG_PRESS_TOL = 12;
window.addEventListener("touchstart", (e) => {
    if (e.target.closest && e.target.closest("#debug")) return;
    if (e.touches.length !== 1) return;
    const t = e.touches[0];
    _touchStartX = t.clientX;
    _touchStartY = t.clientY;
    if (_touchTimer) clearTimeout(_touchTimer);
    _touchTimer = setTimeout(() => {
        document.getElementById("debug").classList.toggle("hidden");
        _touchTimer = null;
    }, LONG_PRESS_MS);
}, { passive: true });
window.addEventListener("touchmove", (e) => {
    if (!_touchTimer || e.touches.length === 0) return;
    const t = e.touches[0];
    if (Math.abs(t.clientX - _touchStartX) > LONG_PRESS_TOL ||
        Math.abs(t.clientY - _touchStartY) > LONG_PRESS_TOL) {
        clearTimeout(_touchTimer);
        _touchTimer = null;
    }
}, { passive: true });
window.addEventListener("touchend", () => {
    if (_touchTimer) { clearTimeout(_touchTimer); _touchTimer = null; }
}, { passive: true });
window.addEventListener("touchcancel", () => {
    if (_touchTimer) { clearTimeout(_touchTimer); _touchTimer = null; }
}, { passive: true });

// ---- Mobile sensors --------------------------------------------------
// Two related bits using the device sensors:
//
//   * Tilt physics (DeviceOrientation): beta/gamma -> a 2D unit vector
//     pointing toward the device's physical "down" in screen frame.
//     Multiplied by tilt_strength and added as an extra acceleration
//     to every floater.
//
//   * Shake-to-respawn (DeviceMotion): when the linear acceleration
//     (gravity removed) magnitude exceeds shake_threshold for an
//     instant, repopulate() is called to randomise the floaters. A
//     short cooldown prevents rapid re-triggers.
//
// On iOS 13+ both APIs need a permission grant from a user gesture;
// elsewhere they just work after addEventListener.
const tiltVec = { x: 0, y: 0 };
let tiltListening  = false;
let shakeListening = false;
let lastShakeAt    = 0;
const SHAKE_COOLDOWN_MS = 800;

function updateSensorStatus(extra) {
    const el = document.getElementById("sensor_status");
    if (!el) return;
    if (extra) { el.textContent = extra; return; }
    if (tiltListening && shakeListening) el.textContent = "Tilt + shake active.";
    else if (tiltListening)  el.textContent = "Tilt active.";
    else if (shakeListening) el.textContent = "Shake active.";
    else                     el.textContent = "Off.";
}

function onDeviceOrientation(e) {
    if (e.beta === null || e.gamma === null) return;
    // Normalise screen orientation to one of 0/90/180/270 so the tilt
    // vector follows the screen's current "down".
    let angle = (window.screen && window.screen.orientation && window.screen.orientation.angle);
    if (angle === undefined || angle === null) angle = window.orientation || 0;
    angle = ((angle % 360) + 360) % 360;

    let bx, by;
    if (angle === 90)       { bx =  e.beta;   by = -e.gamma; }
    else if (angle === 270) { bx = -e.beta;   by =  e.gamma; }
    else if (angle === 180) { bx = -e.gamma;  by = -e.beta;  }
    else                    { bx =  e.gamma;  by =  e.beta;  }

    // Clamp beta into [-90, 90] so flipping past vertical doesn't wrap
    // gravity in a counterintuitive way; sin gives a smooth 0 -> 1 ramp
    // over [0, 90].
    by = Math.max(-90, Math.min(90, by));
    tiltVec.x = Math.sin(bx * Math.PI / 180);
    tiltVec.y = Math.sin(by * Math.PI / 180);
}

function onDeviceMotionShake(e) {
    const a = e.acceleration;  // motion only, gravity removed
    if (!a || a.x === null) return;
    const mag = Math.sqrt((a.x || 0) * (a.x || 0)
                        + (a.y || 0) * (a.y || 0)
                        + (a.z || 0) * (a.z || 0));
    if (mag <= params.shake_threshold) return;
    const now = performance.now();
    if (now - lastShakeAt < SHAKE_COOLDOWN_MS) return;
    lastShakeAt = now;
    repopulate();
}

async function enableTilt() {
    if (tiltListening) return;
    if (typeof DeviceOrientationEvent === "undefined") {
        updateSensorStatus("Device orientation API not available.");
        document.getElementById("tilt_enable").checked = false;
        return;
    }
    if (typeof DeviceOrientationEvent.requestPermission === "function") {
        try {
            const res = await DeviceOrientationEvent.requestPermission();
            if (res !== "granted") {
                updateSensorStatus("Tilt permission denied.");
                document.getElementById("tilt_enable").checked = false;
                return;
            }
        } catch (err) {
            updateSensorStatus("Tilt permission error: " + err.message);
            document.getElementById("tilt_enable").checked = false;
            return;
        }
    }
    window.addEventListener("deviceorientation", onDeviceOrientation);
    tiltListening = true;
    updateSensorStatus();
}

function disableTilt() {
    if (!tiltListening) return;
    window.removeEventListener("deviceorientation", onDeviceOrientation);
    tiltListening = false;
    tiltVec.x = 0;
    tiltVec.y = 0;
    updateSensorStatus();
}

async function enableShake() {
    if (shakeListening) return;
    if (typeof DeviceMotionEvent === "undefined") {
        updateSensorStatus("Device motion API not available.");
        document.getElementById("shake_enable").checked = false;
        return;
    }
    if (typeof DeviceMotionEvent.requestPermission === "function") {
        try {
            const res = await DeviceMotionEvent.requestPermission();
            if (res !== "granted") {
                updateSensorStatus("Shake permission denied.");
                document.getElementById("shake_enable").checked = false;
                return;
            }
        } catch (err) {
            updateSensorStatus("Shake permission error: " + err.message);
            document.getElementById("shake_enable").checked = false;
            return;
        }
    }
    window.addEventListener("devicemotion", onDeviceMotionShake);
    shakeListening = true;
    updateSensorStatus();
}

function disableShake() {
    if (!shakeListening) return;
    window.removeEventListener("devicemotion", onDeviceMotionShake);
    shakeListening = false;
    updateSensorStatus();
}

document.getElementById("tilt_enable").addEventListener("change", (e) => {
    if (e.target.checked) enableTilt();
    else disableTilt();
});
document.getElementById("shake_enable").addEventListener("change", (e) => {
    if (e.target.checked) enableShake();
    else disableShake();
});

// Auto-enable on touch-primary devices (phones, tablets, hybrid laptops
// in tablet mode). On iOS the permission grant must come from a user
// gesture, so if requestPermission exists the actual enable is deferred
// to the very first touch / click.
const IS_TOUCH = window.matchMedia && window.matchMedia("(pointer: coarse)").matches;
if (IS_TOUCH) {
    const tiltCb  = document.getElementById("tilt_enable");
    const shakeCb = document.getElementById("shake_enable");
    tiltCb.checked  = true;
    shakeCb.checked = true;
    const needsGesture = (typeof DeviceOrientationEvent !== "undefined"
                          && typeof DeviceOrientationEvent.requestPermission === "function")
                       || (typeof DeviceMotionEvent !== "undefined"
                          && typeof DeviceMotionEvent.requestPermission === "function");
    if (needsGesture) {
        updateSensorStatus("Tap anywhere to enable.");
        const onFirstGesture = () => {
            window.removeEventListener("touchstart", onFirstGesture);
            window.removeEventListener("click",      onFirstGesture);
            if (tiltCb.checked)  enableTilt();
            if (shakeCb.checked) enableShake();
        };
        window.addEventListener("touchstart", onFirstGesture, { once: true, passive: true });
        window.addEventListener("click",      onFirstGesture, { once: true });
    } else {
        enableTilt();
        enableShake();
    }
}

// ---- Audio reactivity ------------------------------------------------
let audioCtx = null;
let analyser = null;
let audioSource = null;
let audioElement = null;
const fftBuf = new Uint8Array(512);
const bands  = { bass: 0, mid: 0, treble: 0 };

function ensureAudioCtx() {
    if (!audioCtx) {
        const Ctor = window.AudioContext || window.webkitAudioContext;
        audioCtx = new Ctor();
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 1024;
        analyser.smoothingTimeConstant = 0.6;
    }
    if (audioCtx.state === "suspended") audioCtx.resume();
}

function disconnectAudioSource() {
    if (audioSource) { try { audioSource.disconnect(); } catch (_) {} audioSource = null; }
    if (audioElement) { audioElement.pause(); audioElement = null; }
    bands.bass = bands.mid = bands.treble = 0;
}

async function setMicSource() {
    ensureAudioCtx();
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    disconnectAudioSource();
    audioSource = audioCtx.createMediaStreamSource(stream);
    audioSource.connect(analyser);
    // Mic is intentionally NOT connected to destination (no echo).
}

async function setFileSource(file) {
    ensureAudioCtx();
    disconnectAudioSource();
    audioElement = new Audio();
    audioElement.src = URL.createObjectURL(file);
    audioElement.loop = true;
    audioElement.crossOrigin = "anonymous";
    audioSource = audioCtx.createMediaElementSource(audioElement);
    audioSource.connect(analyser);
    analyser.connect(audioCtx.destination);
    await audioElement.play();
}

function sampleAudio() {
    if (!analyser || !audioSource) return;
    analyser.getByteFrequencyData(fftBuf);
    // fftSize=1024 -> 512 bins. Default sample rate ~44.1 kHz -> ~43 Hz/bin.
    // Bass: 1..15 (43..645 Hz), Mid: 16..80 (688..3440 Hz), Treble: 81..300 (3483..12900 Hz)
    let bass = 0, mid = 0, treble = 0;
    for (let i = 1;  i <= 15;  i++) bass   += fftBuf[i];
    for (let i = 16; i <= 80;  i++) mid    += fftBuf[i];
    for (let i = 81; i <= 300; i++) treble += fftBuf[i];
    bands.bass   = bass   / (15  * 255);
    bands.mid    = mid    / (65  * 255);
    bands.treble = treble / (220 * 255);
}

function updateFftDisplay() {
    document.getElementById("fft_bass"  ).style.setProperty("--lvl", (Math.min(1, bands.bass)   * 100) + "%");
    document.getElementById("fft_mid"   ).style.setProperty("--lvl", (Math.min(1, bands.mid)    * 100) + "%");
    document.getElementById("fft_treble").style.setProperty("--lvl", (Math.min(1, bands.treble) * 100) + "%");
}

document.getElementById("audio_source").addEventListener("change", async (e) => {
    const v = e.target.value;
    if (v === "off") {
        disconnectAudioSource();
    } else if (v === "mic") {
        try {
            await setMicSource();
        } catch (err) {
            alert("Microphone access failed: " + err.message);
            e.target.value = "off";
        }
    } else if (v === "file") {
        // File-picker click; the file input handler will load it and
        // bring the dropdown back to "file" or fall back to "off".
        document.getElementById("audio_file").click();
        e.target.value = audioSource ? "file" : "off";
    }
});

// ---- WebMIDI ---------------------------------------------------------
let midiAccess = null;
const midiMappings = JSON.parse(localStorage.getItem("floater_midi") || "{}");
let learnMode   = false;
let learnTarget = null;

function setMidiStatus(text) { document.getElementById("midi_status").textContent = text; }

async function initMidi() {
    if (!navigator.requestMIDIAccess) {
        setMidiStatus("Web MIDI not supported in this browser.");
        return;
    }
    try {
        midiAccess = await navigator.requestMIDIAccess();
        refreshMidiInputs();
        midiAccess.onstatechange = refreshMidiInputs;
    } catch (e) {
        setMidiStatus("MIDI access denied.");
    }
}

function refreshMidiInputs() {
    const sel = document.getElementById("midi_device");
    const prev = sel.value;
    sel.innerHTML = '<option value="">(none)</option><option value="*">All inputs</option>';
    let count = 0;
    for (const input of midiAccess.inputs.values()) {
        const opt = document.createElement("option");
        opt.value = input.id;
        opt.textContent = input.name || ("Input " + count);
        sel.appendChild(opt);
        input.onmidimessage = onMidiMessage;
        count++;
    }
    sel.value = prev || "*";
    setMidiStatus(count === 0 ? "No MIDI inputs detected." : count + " MIDI input(s) connected.");
}

function onMidiMessage(e) {
    const sel = document.getElementById("midi_device");
    if (sel.value && sel.value !== "*" && e.target.id !== sel.value) return;

    const status  = e.data[0];
    const channel = status & 0x0f;
    const type    = status & 0xf0;
    if (type !== 0xb0) return;  // 0xB0 = control change
    const cc    = e.data[1];
    const value = e.data[2];

    if (learnMode && learnTarget) {
        midiMappings[learnTarget] = { channel: channel, cc: cc };
        localStorage.setItem("floater_midi", JSON.stringify(midiMappings));
        clearLearnTarget();
        renderMidiList();
        return;
    }

    for (const sliderId in midiMappings) {
        const m = midiMappings[sliderId];
        if (m.channel !== channel || m.cc !== cc) continue;
        const slider = document.getElementById(sliderId);
        if (!slider) continue;
        const min = parseFloat(slider.min);
        const max = parseFloat(slider.max);
        slider.value = min + (max - min) * (value / 127);
        slider.dispatchEvent(new Event("input"));
    }
}

function clearLearnTarget() {
    if (learnTarget) document.getElementById(learnTarget)?.classList.remove("learn-target");
    learnTarget = null;
}

function renderMidiList() {
    const list    = document.getElementById("midi_list");
    const entries = Object.entries(midiMappings);
    if (entries.length === 0) { list.textContent = "No mappings."; return; }
    list.innerHTML = "";
    for (const [id, m] of entries) {
        const row = document.createElement("div");
        const lbl = document.createElement("span");
        lbl.textContent = id.replace(/^s_/, "") + " ← ch" + (m.channel + 1) + " cc" + m.cc;
        const btn = document.createElement("button");
        btn.textContent = "×";
        btn.title = "Remove mapping";
        btn.addEventListener("click", () => {
            delete midiMappings[id];
            localStorage.setItem("floater_midi", JSON.stringify(midiMappings));
            renderMidiList();
        });
        row.appendChild(lbl);
        row.appendChild(btn);
        list.appendChild(row);
    }
}

document.getElementById("midi_learn").addEventListener("click", () => {
    learnMode = !learnMode;
    document.getElementById("midi_learn").textContent = learnMode ? "Stop Learn" : "MIDI Learn";
    document.getElementById("debug").classList.toggle("learn-mode", learnMode);
    if (!learnMode) clearLearnTarget();
});

document.getElementById("midi_clear").addEventListener("click", () => {
    if (!confirm("Clear all MIDI mappings?")) return;
    for (const k of Object.keys(midiMappings)) delete midiMappings[k];

// ---- Main loop --------------------------------------------------------
(async () => {
    const textures = {};
    for (const [key, dataUrl] of Object.entries(LOGO_DATA)) {
        textures[key] = await loadTexture(dataUrl);
    }

    repopulate();

    let last_t = performance.now() / 1000;
    function frame() {
        const now = performance.now() / 1000;
        const dt  = Math.min(now - last_t, 0.1);
        last_t    = now;

        // ---- Audio reactivity ----
        // Audio bands modulate a few params on top of their slider values.
        // Mapping: bass -> motion + wobble; mid -> hue cycle + slight depth
        // pulse; treble -> chromatic aberration. All sensitivities are 0
        // when audio is off, so this is a no-op without a source.
        sampleAudio();
        updateFftDisplay();
        const live_flow   = params.flow_strength + bands.bass   * params.audio_bass   * 200;
        const live_wobble = params.wobble_amp    + bands.bass   * params.audio_bass   * 0.10;
        const live_hspd   = params.hue_speed     + bands.mid    * params.audio_mid    * 1.0;
        const live_aber   = params.aberration    + bands.treble * params.audio_treble * 0.05;

        // ---- Physics step ----
        // Tilt acceleration is added on top of flow forces and gravity.
        // tiltVec is zero unless the user enabled the Tilt checkbox.
        const tiltAx = tiltVec.x * params.tilt_strength;
        const tiltAy = tiltVec.y * params.tilt_strength;
        for (const f of floaters) {
            const fx = live_flow * Math.sin(now * f.flow_fx + f.flow_phx);
            const fy = live_flow * Math.cos(now * f.flow_fy + f.flow_phy);
            f.vel_x = (f.vel_x + (fx + tiltAx) * dt)                    * (1 - params.damping * dt);
            f.vel_y = (f.vel_y + (fy + tiltAy + params.gravity) * dt)   * (1 - params.damping * dt);
            clamp_speed(f);

            f.cx    += f.vel_x * dt;
            f.cy    += f.vel_y * dt;
            f.angle += f.spin  * dt;
            bounce(f, now);
        }

        for (let i = 0; i < floaters.length; i++) {
            if (!logoEnabled[floaters[i].key]) continue;
            for (let j = i + 1; j < floaters.length; j++) {
                if (!logoEnabled[floaters[j].key]) continue;
                collide_pair(floaters[i], floaters[j], now);
            }
        }

        floaters.sort((a, b) => size_of(a, now) - size_of(b, now));

        // ---- Frame setup ----
        gl.viewport(0, 0, canvas.width, canvas.height);

        // ---- Trail fade vs. clear ----
        if (params.trail_persistence > 0) {
            // Persistence-based fade: alpha = 1 - exp(-dt / persistence). At
            // persistence -> 0 this approaches 1 (full clear); at large
            // persistence approaches 0 (no fade, infinite trails).
            const fadeAlpha = 1 - Math.exp(-dt / params.trail_persistence);
            gl.useProgram(progFade);
            gl.bindBuffer(gl.ARRAY_BUFFER, fadeBuffer);
            gl.enableVertexAttribArray(A_FADE);
            gl.vertexAttribPointer(A_FADE, 2, gl.FLOAT, false, 0, 0);
            gl.uniform4f(U_FADE_COL, 0, 0, 0, fadeAlpha);
            gl.drawArrays(gl.TRIANGLES, 0, 6);
        } else {
            gl.clear(gl.COLOR_BUFFER_BIT);
        }

        // ---- Logos ----
        gl.useProgram(progLogo);
        gl.bindBuffer(gl.ARRAY_BUFFER, quadBuffer);
        gl.enableVertexAttribArray(A_POS);
        gl.enableVertexAttribArray(A_UV);
        gl.vertexAttribPointer(A_POS, 2, gl.FLOAT, false, 16, 0);
        gl.vertexAttribPointer(A_UV,  2, gl.FLOAT, false, 16, 8);

        gl.uniform1f(U_TIME,   now);
        gl.uniform1f(U_WOBBLE, live_wobble);
        gl.uniform1f(U_ABER,   live_aber);
        gl.uniform2f(U_SCREEN, canvas.width, canvas.height);
        gl.activeTexture(gl.TEXTURE0);
        gl.uniform1i(U_TEX, 0);

        for (const f of floaters) {
            if (!logoEnabled[f.key]) continue;
            const size = size_of(f, now);
            const a    = f.angle * Math.PI / 180;
            const c    = Math.cos(a);
            const s    = Math.sin(a);
            const xform = new Float32Array([
                c * size,  s * size, 0,
               -s * size,  c * size, 0,
                f.cx,      f.cy,     1,
            ]);

            const hue = (f.hue_offset + now * live_hspd) * 2 * Math.PI * params.hue_intensity;
            gl.uniform1f(U_HUE, hue);
            gl.uniformMatrix3fv(U_XFORM, false, xform);
            gl.bindTexture(gl.TEXTURE_2D, textures[f.key]);
            gl.drawArrays(gl.TRIANGLES, 0, 6);
        }

        requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
})();
</script>
</body>
</html>
